<!DOCTYPE html>
<html>
<head>

    <meta charset="UTF-8">
    <title>MIDI Analyzer Player</title>

    <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>

    <style>
        body{
            font-family: monospace;
            background:#111;
            color:white;
            padding:30px;
        }

        button{
            padding:10px 20px;
            font-size:16px;
            margin-bottom:20px;
            margin-right:10px;
        }

        .note{
            padding:4px 0;
        }

        .current{
            font-weight:bold;
        }

        canvas{
            border:1px solid #333;
            margin-top:20px;
            background:#0b0b0b;
        }
    </style>

</head>

<body>

<h1>MIDI Analyzer</h1>

<button onclick="playMidi()">Play</button>
<button onclick="clearLiveNotes()">Clear</button>

<h2>Detected Scale</h2>
<div id="scale">loading...</div>

<h2>Current Chord</h2>
<div id="currentChord">-</div>

<h2>Piano Roll</h2>
<canvas id="pianoRoll" width="900" height="300"></canvas>

<h2>Now Playing (Melody)</h2>
<div id="currentNote">-</div>

<h2>Interval</h2>
<div id="interval">-</div>

<h2>Live Notes</h2>
<div id="liveNotes"></div>

<script>

    let analysis
    let synth
    let part
    let chordPart

    const MAX_VISIBLE = 30

    const NOTE_COLORS = {
        "C": "#ff4d4d",
        "C#": "#ff944d",
        "D": "#ffd24d",
        "D#": "#d4ff4d",
        "E": "#4dff88",
        "F": "#4dd2ff",
        "F#": "#4d88ff",
        "G": "#944dff",
        "G#": "#d94dff",
        "A": "#ff4da6",
        "A#": "#ff4d73",
        "B": "#ffffff"
    }

    const INTERVAL_NAMES = {
        1: "minor 2nd",
        2: "major 2nd",
        3: "minor 3rd",
        4: "major 3rd",
        5: "perfect 4th",
        6: "tritone",
        7: "perfect 5th",
        8: "minor 6th",
        9: "major 6th",
        10: "minor 7th",
        11: "major 7th",
        0: "octave"
    }

    function getPitchClass(noteName){
        return noteName.replace(/[0-9]/g, "")
    }

    async function loadData(){
        const res = await fetch("analysis.json?v=" + Date.now())
        analysis = await res.json()

        document.getElementById("scale").innerText =
            analysis.scale.root + " " + analysis.scale.scale
    }

    function addLiveNote(noteName, text){
        const container = document.getElementById("liveNotes")

        const div = document.createElement("div")
        div.className = "note current"

        const pitchClass = getPitchClass(noteName)
        const color = NOTE_COLORS[pitchClass] || "white"

        div.style.color = color
        div.innerText = noteName + "  |  " + text

        container.prepend(div)

        const notes = container.querySelectorAll(".note")
        notes.forEach((n,i)=>{
            if(i !== 0) n.classList.remove("current")
        })

        if(notes.length > MAX_VISIBLE){
            container.removeChild(container.lastChild)
        }
    }

    function clearLiveNotes(){
        document.getElementById("liveNotes").innerHTML = ""
        document.getElementById("currentNote").innerText = "-"
        document.getElementById("interval").innerText = "-"
        document.getElementById("currentChord").innerText = "-"
    }

    const canvas = document.getElementById("pianoRoll")
    const ctx = canvas.getContext("2d")

    function drawPianoRoll(timeNow = 0){

        if(!analysis) return

        ctx.clearRect(0,0,canvas.width,canvas.height)

        const notes = analysis.notes

        const minPitch = Math.min(...notes.map(n=>n.pitch))
        const maxPitch = Math.max(...notes.map(n=>n.pitch))
        const pitchRange = maxPitch - minPitch + 1

        const totalTime = Math.max(...notes.map(n=>n.start + n.duration))

        notes.forEach((n)=>{

            const x = (n.start / totalTime) * canvas.width
            const w = Math.max(2, (n.duration / totalTime) * canvas.width)

            const y =
                canvas.height -
                ((n.pitch - minPitch + 1) / pitchRange) * canvas.height

            const h = Math.max(3, canvas.height / pitchRange)

            ctx.fillStyle = n.hand === "left" ? "#55aaff" : "#ff66cc"
            ctx.fillRect(x, y, w, h)
        })

        const playX = (timeNow / totalTime) * canvas.width

        ctx.strokeStyle = "#00ff88"
        ctx.beginPath()
        ctx.moveTo(playX, 0)
        ctx.lineTo(playX, canvas.height)
        ctx.stroke()
    }

    async function playMidi(){

        if(!analysis){
            alert("No analysis loaded")
            return
        }

        await Tone.start()

        Tone.Transport.stop()
        Tone.Transport.cancel()

        synth = new Tone.PolySynth(Tone.Synth,{
            maxPolyphony:64
        }).toDestination()

        const events = analysis.notes.map((note,i)=>({
            time: note.start,
            pitch: note.pitch,
            duration: note.duration,
            velocity: note.velocity,
            name: note.name,
            index: i,
            hand: note.hand
        }))

        part = new Tone.Part((time, noteData)=>{

            synth.triggerAttackRelease(
                Tone.Frequency(noteData.pitch,"midi"),
                noteData.duration,
                time,
                noteData.velocity
            )

            if(noteData.hand === "right"){

                const rightIndex = analysis.rightHand.findIndex((n) =>
                    n.start === noteData.time &&
                    n.pitch === noteData.pitch &&
                    n.name === noteData.name
                )

                const pitchClass = getPitchClass(noteData.name)
                const color = NOTE_COLORS[pitchClass] || "white"

                const currentNoteEl = document.getElementById("currentNote")
                currentNoteEl.innerText = noteData.name
                currentNoteEl.style.color = color

                let intervalText = "-"

                const interval = analysis.intervals[rightIndex]

                if(interval){
                    const abs = Math.abs(interval.semitones)
                    const simple = abs % 12

                    const name =
                        INTERVAL_NAMES[simple] ||
                        simple + " semitones"

                    const direction =
                        interval.semitones > 0 ? "↑" :
                            interval.semitones < 0 ? "↓" : "-"

                    intervalText =
                        direction + " " +
                        abs +
                        " (" + name + ", " + interval.type + ")" +
                        " | vel: " + noteData.velocity.toFixed(2)

                } else {
                    intervalText = "end"
                }

                document.getElementById("interval").innerText =
                    intervalText

                addLiveNote(noteData.name, intervalText)
            }

        }, events)

        chordPart = new Tone.Part((time, chordData) => {
            document.getElementById("currentChord").innerText =
                chordData.chord.label
        }, analysis.chords)

        part.start(0)
        chordPart.start(0)

        Tone.Transport.scheduleRepeat(() => {
            drawPianoRoll(Tone.Transport.seconds)
        }, 0.016)

        Tone.Transport.seconds = 0
        Tone.Transport.start()
    }

    loadData()

</script>

</body>
</html>
